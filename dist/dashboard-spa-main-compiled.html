  /**
   * Syntax highlight JSON string
   * @private
   */
  _syntaxHighlightJSON(json) {
    if (typeof json !== 'string') {
      json = JSON.stringify(json, null, 2);
    }

    // Replace special characters and add color classes
    json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // First, color the values
    json = json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
      let cls = 'text-emerald-300'; // numbers

      if (/^"/.test(match)) {
        if (/:$/.test(match)) {
          cls = 'text-cyan-400'; // keys
        } else {
          cls = 'text-amber-300'; // string values
        }
      } else if (/true|false/.test(match)) {
        cls = 'text-purple-400'; // booleans
      } else if (/null/.test(match)) {
        cls = 'text-purple-400'; // null
      }

      return '<span class="' + cls + '">' + match + '</span>';
    });

    // Then, color the structural characters (brackets, braces, colons, commas)
    json = json.replace(/([{}\[\],:])/g, '<span class="text-gray-400">$1</span>');

    return json;
  },

  /**
   * Create a key-value display
   */
  createKeyValue(data) {
    const dl = document.createElement('dl');
    dl.className = 'grid grid-cols-1 gap-x-4 gap-y-4 sm:grid-cols-2';

    Object.entries(data).forEach(([key, value]) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'sm:col-span-1';

      const dt = document.createElement('dt');
      dt.className = 'text-sm font-medium text-gray-500';
      dt.textContent = key.replace(/_/g, ' ');

      const dd = document.createElement('dd');
      dd.className = 'mt-1 text-sm';

      // Handle objects with pretty formatting and syntax highlighting
      if (typeof value === 'object' && value !== null) {
        const pre = document.createElement('pre');
        pre.className = 'bg-gray-900 p-3 rounded text-xs overflow-x-auto font-mono leading-relaxed';
        pre.innerHTML = this._syntaxHighlightJSON(value);
        dd.appendChild(pre);
      } else {
        dd.className += ' text-gray-900';
        dd.textContent = value;
      }

      wrapper.appendChild(dt);
      wrapper.appendChild(dd);
      dl.appendChild(wrapper);
    });

    return dl;
  },

  /**
   * Create an autocomplete/searchable dropdown component
   * @param {Array} items - Array of items to search through
   * @param {Object} options - Configuration options
   * @param {String} options.labelKey - Key to use for display label (default: 'label' or 'name')
   * @param {String} options.valueKey - Key to use for value (default: 'value' or 'id')
   * @param {String} options.placeholder - Placeholder text (default: 'Search...')
   * @param {Function} options.onSelect - Callback when item selected (item) => {}
   * @param {Function} options.searchFn - Custom search function (item, searchTerm) => boolean
   * @param {Boolean} options.showClearButton - Show X button to clear selection (default: true)
   * @param {String} options.noResultsText - Text when no results (default: 'No results found')
   * @param {Number} options.maxResults - Maximum results to show (default: 10)
   * @returns {HTMLElement} Autocomplete container
   */
  createAutocomplete(items, options = {}) {
    const {
      labelKey = items[0]?.label !== undefined ? 'label' : 'name',
      valueKey = items[0]?.value !== undefined ? 'value' : 'id',
      subtitleKey = null,
      placeholder = 'Search...',
      onSelect = null,
      searchFn = null,
      showClearButton = true,
      noResultsText = 'No results found',
      maxResults = 10
    } = options;

    // State
    let selectedItem = null;
    let filteredItems = [];
    let highlightedIndex = -1;
    let isDropdownOpen = false;

    // Create container
    const container = document.createElement('div');
    container.className = 'relative w-full';

    // Create input wrapper
    const inputWrapper = document.createElement('div');
    inputWrapper.className = 'relative';

    // Create search input
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = placeholder;
    input.className = 'w-full px-3 py-2 pr-10 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-rewst-teal focus:border-rewst-teal';

    // Create dropdown arrow button
    const dropdownBtn = document.createElement('button');
    dropdownBtn.type = 'button';
    dropdownBtn.className = 'material-icons absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer transition-transform';
    dropdownBtn.style.fontSize = '20px';
    dropdownBtn.textContent = 'arrow_drop_down';

    // Create clear button (hidden by default)
    const clearBtn = document.createElement('button');
    clearBtn.type = 'button';
    clearBtn.className = 'material-icons absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer';
    clearBtn.style.fontSize = '20px';
    clearBtn.textContent = 'close';
    clearBtn.style.display = 'none'; // Hidden by default

    inputWrapper.appendChild(input);
    inputWrapper.appendChild(dropdownBtn);
    if (showClearButton) {
      inputWrapper.appendChild(clearBtn);
    }
    container.appendChild(inputWrapper);

    // Create subtitle display below input (for showing ID when selected)
    let subtitleDisplay = null;
    if (subtitleKey) {
      subtitleDisplay = document.createElement('div');
      subtitleDisplay.className = 'text-xs text-gray-500 mt-1 px-1';
      subtitleDisplay.style.display = 'none';
      container.appendChild(subtitleDisplay);
    }

    // Create dropdown
    const dropdown = document.createElement('div');
    dropdown.className = 'hidden absolute z-10 w-full mt-1 bg-white border border-gray-200 rounded-md shadow-lg max-h-60 overflow-auto';
    container.appendChild(dropdown);

    // Default search function
    const defaultSearchFn = (item, searchTerm) => {
      const label = String(item[labelKey] || '').toLowerCase();
      const value = String(item[valueKey] || '').toLowerCase();
      const search = searchTerm.toLowerCase();
      return label.includes(search) || value.includes(search);
    };

    const searchFunction = searchFn || defaultSearchFn;

    // Render dropdown results
    const renderDropdown = () => {
      dropdown.innerHTML = '';
      highlightedIndex = -1;

      if (filteredItems.length === 0) {
        const noResults = document.createElement('div');
        noResults.className = 'px-3 py-2 text-sm text-gray-500 italic';
        noResults.textContent = noResultsText;
        dropdown.appendChild(noResults);
        return;
      }

      // Limit results
      const displayItems = filteredItems.slice(0, maxResults);

      displayItems.forEach((item, idx) => {
        const itemEl = document.createElement('button');
        itemEl.type = 'button';
        itemEl.className = 'w-full px-3 py-2 text-left text-sm hover:bg-rewst-light transition-colors cursor-pointer';
        itemEl.dataset.index = idx;

        // If subtitleKey is set, show label + subtitle
        if (subtitleKey && item[subtitleKey]) {
          const labelSpan = document.createElement('div');
          labelSpan.className = 'font-medium';
          labelSpan.textContent = item[labelKey];
          const subtitleSpan = document.createElement('div');
          subtitleSpan.className = 'text-xs text-gray-500';
          subtitleSpan.textContent = item[subtitleKey];
          itemEl.appendChild(labelSpan);
          itemEl.appendChild(subtitleSpan);
        } else {
          itemEl.textContent = item[labelKey];
        }

        itemEl.addEventListener('click', () => {
          selectItem(item);
        });

        itemEl.addEventListener('mouseenter', () => {
          highlightedIndex = idx;
          updateHighlight();
        });

        dropdown.appendChild(itemEl);
      });

      if (filteredItems.length > maxResults) {
        const moreResults = document.createElement('div');
        moreResults.className = 'px-3 py-2 text-sm text-gray-500 italic border-t border-gray-200';
        moreResults.textContent = `${filteredItems.length - maxResults} more results...`;
        dropdown.appendChild(moreResults);
      }
    };

    // Update highlighted item
    const updateHighlight = () => {
      const items = dropdown.querySelectorAll('button');
      items.forEach((item, idx) => {
        if (idx === highlightedIndex) {
          item.classList.add('bg-rewst-light');
        } else {
          item.classList.remove('bg-rewst-light');
        }
      });
    };

    // Select an item
    const selectItem = (item) => {
      selectedItem = item;
      input.value = item[labelKey];
      dropdown.classList.add('hidden');
      isDropdownOpen = false;

      // Update subtitle display below input if subtitleKey is set
      if (subtitleKey && subtitleDisplay) {
        if (item[subtitleKey]) {
          subtitleDisplay.textContent = item[subtitleKey];
          subtitleDisplay.style.display = '';
        } else {
          subtitleDisplay.style.display = 'none';
        }
      }

      // Show clear button, hide dropdown arrow
      if (showClearButton) {
        clearBtn.style.display = '';
        dropdownBtn.style.display = 'none';
      }

      // Callback
      if (onSelect) {
        onSelect(item);
      }
    };

    // Clear selection
    const clearSelection = () => {
      selectedItem = null;
      input.value = '';
      dropdown.classList.add('hidden');
      isDropdownOpen = false;

      // Hide clear button, show dropdown arrow
      if (showClearButton) {
        clearBtn.style.display = 'none';
        dropdownBtn.style.display = '';
      }

      // Hide subtitle display
      if (subtitleDisplay) {
        subtitleDisplay.style.display = 'none';
      }

      input.focus();
    };

    // Show dropdown with all or filtered items
    const showDropdown = () => {
      const searchTerm = input.value.trim();

      if (searchTerm === '') {
        // Show all items when empty
        filteredItems = [...items];
      } else {
        // Filter items based on search
        filteredItems = items.filter(item => searchFunction(item, searchTerm));
      }

      renderDropdown();
      dropdown.classList.remove('hidden');
      isDropdownOpen = true;
    };

    // Hide dropdown
    const hideDropdown = () => {
      dropdown.classList.add('hidden');
      isDropdownOpen = false;
    };

    // Input event - filter and show dropdown
    input.addEventListener('input', (e) => {
      const searchTerm = e.target.value.trim();

      if (searchTerm === '') {
        filteredItems = [...items];
      } else {
        filteredItems = items.filter(item => searchFunction(item, searchTerm));
      }

      renderDropdown();
      dropdown.classList.remove('hidden');
      isDropdownOpen = true;
    });

    // Focus - show dropdown (only if not already open)
    input.addEventListener('focus', () => {
      if (!isDropdownOpen) {
        showDropdown();
      }
    });

    // Dropdown arrow button click - toggle dropdown
    dropdownBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (isDropdownOpen) {
        hideDropdown();
      } else {
        input.focus();
        showDropdown();
      }
    });

    // Keyboard navigation
    input.addEventListener('keydown', (e) => {
      const itemCount = Math.min(filteredItems.length, maxResults);

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (!isDropdownOpen) {
          showDropdown();
        }
        highlightedIndex = Math.min(highlightedIndex + 1, itemCount - 1);
        updateHighlight();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        highlightedIndex = Math.max(highlightedIndex - 1, 0);
        updateHighlight();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (highlightedIndex >= 0 && highlightedIndex < itemCount) {
          selectItem(filteredItems[highlightedIndex]);
        }
      } else if (e.key === 'Escape') {
        hideDropdown();
        input.blur();
      }
    });

    // Clear button click
    clearBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      clearSelection();
    });

    // Click outside to close
    document.addEventListener('click', (e) => {
      if (!container.contains(e.target)) {
        hideDropdown();
      }
    });

    // Public API
    container.getValue = () => selectedItem ? selectedItem[valueKey] : null;
    container.getSelectedItem = () => selectedItem;
    container.setValue = (value) => {
      const item = items.find(i => i[valueKey] === value);
      if (item) {
        selectItem(item);
      }
    };
    container.clear = () => clearSelection();
    container.updateItems = (newItems) => {
      items = newItems;
      if (isDropdownOpen) {
        showDropdown();
      }
    };

    return container;
  },

  /**
   * Get or create toast container
   * @private
   */
  _getToastContainer() {
    let container = document.getElementById('rewst-toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'rewst-toast-container';
      container.className = 'fixed top-4 right-4 z-50 space-y-2';
      document.body.appendChild(container);
    }
    return container;
  },

  /**
   * Show a toast notification using Rewst alert styles
   * @param {String} message - Message to display
   * @param {String} type - Type of toast: 'success', 'warning', 'error', 'info'
   * @param {Number} duration - Duration in ms (default: 4000)
   */
  showToast(message, type = 'info', duration = 4000) {
    const container = this._getToastContainer();

    // Create toast element using alert classes
    const toast = document.createElement('div');
    toast.className = 'alert min-w-[320px] max-w-md transform translate-x-full transition-transform duration-300 ease-out';
    toast.style.opacity = '1'; // Force full opacity

    // Add type-specific alert class
    const alertTypes = {
      success: 'alert-success',
      warning: 'alert-warning',
      error: 'alert-error',
      info: 'alert-info'
    };
    toast.className += ' ' + (alertTypes[type] || alertTypes.info);

    // Create icon
    const icon = document.createElement('span');
    icon.className = 'material-icons';
    const icons = {
      success: 'check_circle',
      warning: 'warning',
      error: 'error',
      info: 'info'
    };
    icon.textContent = icons[type] || icons.info;

    // Create message container
    const messageContainer = document.createElement('div');
    messageContainer.className = 'flex-1';

    // Add message text
    const messageText = document.createElement('span');
    messageText.textContent = message;
    messageContainer.appendChild(messageText);

    // Create close button
    const closeBtn = document.createElement('button');
    closeBtn.className = 'material-icons ml-auto opacity-70 hover:opacity-100 transition-opacity cursor-pointer';
    closeBtn.textContent = 'close';
    closeBtn.style.fontSize = '20px';
    closeBtn.onclick = () => this._removeToast(toast);

    // Assemble toast
    toast.appendChild(icon);
    toast.appendChild(messageContainer);
    toast.appendChild(closeBtn);
    container.appendChild(toast);

    // Trigger slide-in animation
    setTimeout(() => {
      toast.classList.remove('translate-x-full');
      toast.classList.add('translate-x-0');
    }, 10);

    // Auto-dismiss
    if (duration > 0) {
      setTimeout(() => {
        this._removeToast(toast);
      }, duration);
    }

    return toast;
  },

  /**
   * Remove a toast with fade-out animation
   * @private
   */
  _removeToast(toast) {
    toast.classList.add('translate-x-full', 'opacity-0');
    setTimeout(() => {
      if (toast.parentNode) {
        toast.parentNode.removeChild(toast);
      }
    }, 300);
  },

  /**
   * Show success toast
   * @param {String} message - Success message
   * @param {Number} duration - Duration in ms (default: 4000)
   */
  showSuccess(message, duration = 4000) {
    return this.showToast(message, 'success', duration);
  },

  /**
   * Show warning toast
   * @param {String} message - Warning message
   * @param {Number} duration - Duration in ms (default: 4000)
   */
  showWarning(message, duration = 4000) {
    return this.showToast(message, 'warning', duration);
  },

  /**
   * Show error toast
   * @param {String} message - Error message
   * @param {Number} duration - Duration in ms (default: 5000)
   */
  showError(message, duration = 5000) {
    return this.showToast(message, 'error', duration);
  },

  /**
   * Show info toast
   * @param {String} message - Info message
   * @param {Number} duration - Duration in ms (default: 4000)
   */
  showInfo(message, duration = 4000) {
    return this.showToast(message, 'info', duration);
  },

     * Animate a number counting up
     * @param {HTMLElement} element - The element to animate
     * @param {String|Number} finalValue - The final value (can include $, %, commas, etc.)
     * @param {Number} duration - Animation duration in ms (default: 1000)
     */
      animateNumber(element, finalValue, duration = 1000) {
            const numericValue = parseFloat(String(finalValue).replace(/[^0-9.-]/g, ''));
            
            if (isNaN(numericValue) || numericValue === 0) {
              element.textContent = finalValue;
              return;
            }
            
            // Extract prefix/suffix (like $ or %)
            const valueStr = String(finalValue);
            const prefix = valueStr.match(/^[^0-9.-]+/)?.[0] || '';
            const suffix = valueStr.match(/[^0-9.,]+$/)?.[0] || '';
            
            // Start at 0
            element.textContent = prefix + '0' + suffix;
            
            const startTime = performance.now();
            const hasCommas = valueStr.includes(',');
            const hasDecimals = valueStr.includes('.');
            
            function animate(currentTime) {
              const elapsed = currentTime - startTime;
              const progress = Math.min(elapsed / duration, 1);
              
              // Easing function (ease-out-cubic)
              const eased = 1 - Math.pow(1 - progress, 3);
              const current = numericValue * eased;
              
              // Format the number
              let displayValue;
              if (hasCommas) {
                displayValue = Math.floor(current).toLocaleString();
              } else if (hasDecimals) {
                displayValue = current.toFixed(1);
              } else {
                displayValue = Math.floor(current).toString();
              }
              
              element.textContent = prefix + displayValue + suffix;
              
              if (progress < 1) {
                requestAnimationFrame(animate);
              } else {
                element.textContent = finalValue; // Set exact final value
              }
            }
            
            requestAnimationFrame(animate);

    debugLog('[Roadmap] load()');

    // Use a targeted name+orgId query so we find the variable even when
    // getOrgVariablesWithOrg()'s 500-item cap would miss it. (Real bug —
    // orgs with >500 variables saw `roadmap_data` past the cutoff, load
    // thought it was missing, save-then-refresh wiped the data.)
    const myOrgId = rewst.orgId;
    const matches = await rewst.getOrgVariablesWithOrgByName(ROADMAP_VAR_NAME, myOrgId);

    // Defensive re-filter by owning org id — the lib already filters but cascade
    // edge cases (parent's variable showing up via the scan fallback) make it
    // worth the belt-and-suspenders check.
    let variable = matches.find(v => v.organization?.id === myOrgId) || null;

    if (!variable) {
      debugLog('[Roadmap] variable not found for this org, seeding empty array');
      await this._seed();
      return [];
    }

    this._cachedVar = variable;
    return this._parseValue(variable.value).map(_migrateRow);
  },

  async save(rows) {
    debugLog('[Roadmap] save()', rows.length, 'rows');

    let variable = this._cachedVar;

    // Edge case: cache empty (e.g. mid-session) — re-fetch using the same
    // targeted query as load() so the 500-item cap can't cause a false miss.
    if (!variable) {
      const myOrgId = rewst.orgId;
      const matches = await rewst.getOrgVariablesWithOrgByName(ROADMAP_VAR_NAME, myOrgId);
      variable = matches.find(v => v.organization?.id === myOrgId) || null;
      if (!variable) {
        debugWarn('[Roadmap] variable missing on save, re-seeding');
        return this._seed(rows);
      }
      this._cachedVar = variable;
    }

    const mutation = `
      mutation updateOrgVariablesFromListPage($orgVariables: [OrgVariableUpdateInput!]!) {
        updateOrgVariables(orgVariables: $orgVariables) {
          id
          name
          value
          category
          cascade
          orgId
          updatedAt
        }
      }
    `;

    const input = {
      id: variable.id,
      name: variable.name,
      value: JSON.stringify(rows),
      category: variable.category,
      cascade: variable.cascade,
      orgId: variable.organization?.id || variable.orgId || rewst.orgId,
    };

    const result = await rewst._graphql(
      'updateOrgVariablesFromListPage',
      mutation,
      { orgVariables: [input] }
    );

    if (result?.updateOrgVariables?.[0]) {
      this._cachedVar = result.updateOrgVariables[0];
    }

    return this._cachedVar;
  },

  async _seed(initialRows = []) {
    const mutation = `
      mutation createOrgVariable($orgVariable: OrgVariableCreateInput!) {
        createOrgVariable(orgVariable: $orgVariable) {
          id
          name
          value
          category
          cascade
          orgId
          createdAt
          updatedAt
        }
      }
    `;

    const input = {
      name: ROADMAP_VAR_NAME,
      value: JSON.stringify(initialRows),
      category: ROADMAP_VAR_CATEGORY,
      cascade: ROADMAP_VAR_CASCADE,
      orgId: rewst.orgId,
    };

    const result = await rewst._graphql(
      'createOrgVariable',
      mutation,
      { orgVariable: input }
    );

    this._cachedVar = result?.createOrgVariable || null;
    debugLog('[Roadmap] seeded variable', this._cachedVar?.id);
    return this._cachedVar;
  },

  _parseValue(value) {
    if (Array.isArray(value)) return value;
    if (value && typeof value === 'object') return value;
    if (!value || value === 'null') return [];
    if (typeof value === 'string') {
      try {
        const parsed = JSON.parse(value);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        debugError('[Roadmap] failed to parse stored value', e, value);
        return [];
      }
    }
    return [];
  },
};

// ============================================
// TIMESTAMP PARSER
// Rewst API returns updatedAt in formats that aren't always ISO — handles
// strings, numbers, and Unix epoch (seconds or milliseconds). Returns null
// for anything unparseable so callers can skip rendering rather than show
// "Invalid Date".
// ============================================
function _parseRewstTimestamp(value) {
  if (value === null || value === undefined || value === '') return null;
  if (value instanceof Date) return isNaN(value.getTime()) ? null : value;

  if (typeof value === 'string') {
    // Try direct ISO / RFC parse first
    let d = new Date(value);
    if (!isNaN(d.getTime())) return d;
    // Fall through: maybe a numeric epoch as a string
    const asNum = Number(value);
    if (!isNaN(asNum) && asNum > 0) {
      d = new Date(asNum < 1e12 ? asNum * 1000 : asNum); // seconds vs ms
      if (!isNaN(d.getTime())) return d;
    }
    return null;
  }

  if (typeof value === 'number') {
    const d = new Date(value < 1e12 ? value * 1000 : value);
    return isNaN(d.getTime()) ? null : d;
  }

  return null;
}

// ============================================
// MONTHLY-HOURS HELPER
// hoursPerExecution × executionsPerMonth per row. Both come from manual entry —
// the roadmap is a planning artifact, not a live execution dashboard.
// (For live workflow performance, customers should use Rewst's built-in dashboard.)
// ============================================
function _monthlyHoursFor(row) {
  const h = parseFloat(row?.hoursPerExecution) || 0;
  const e = parseFloat(row?.executionsPerMonth) || 0;
  return h * e;
}

      // If it exists and the new key doesn't, copy it over and remove the old.
      const oldKey = 'roadmap-view';
      const newKey = 'rewst-roadmap-view';
      const old = localStorage.getItem(oldKey);
      if (old !== null && localStorage.getItem(newKey) === null) {
        localStorage.setItem(newKey, old);
        localStorage.removeItem(oldKey);
      }
      let stored = localStorage.getItem(newKey);
      // Migrate the legacy 'category' and 'tags' view names — both collapse
      // to 'kanban' since the per-tag/per-category kanban view was retired
      // (Tag Coverage tile in the hero strip carries that story instead).
      if (stored === 'category' || stored === 'tags') {
        stored = 'kanban';
        try { localStorage.setItem(newKey, 'kanban'); } catch (e) { /* ignore */ }
      }
      // Valid values: 'table', 'kanban' (by status)
      if (stored === 'kanban') return 'kanban';
      return 'table';
    } catch (e) { return 'table'; }
  })(),
  // Kanban-only client-side filter (table has its own filters via createTable).
  // Search is debounced; priority is instant on dropdown change.
  kanbanFilter: { search: '', priority: 'all' },

// Idempotent migrations — runs on every load so old data gets fixed transparently.
// Once a save happens after this, the persisted shape catches up.
function _migrateRow(row) {
  let m = row;

  // 1. Legacy `deadline` → `targetDate`
  if (m && m.deadline !== undefined && m.targetDate === undefined) {
    const { deadline, ...rest } = m;
    m = { ...rest, targetDate: deadline };
  }

  // 2. Legacy `hoursSavedPerMonth` → split into hoursPerExecution + executionsPerMonth.
  //    Preserve total monthly hours by setting hoursPerExecution=1 and
  //    executionsPerMonth=oldValue. User can then edit to more meaningful numbers.
  if (m && m.hoursSavedPerMonth !== undefined
        && m.hoursPerExecution === undefined
        && m.executionsPerMonth === undefined) {
    const { hoursSavedPerMonth, ...rest } = m;
    m = {
      ...rest,
      hoursPerExecution: 1,
      executionsPerMonth: parseFloat(hoursSavedPerMonth) || 0,
    };
  }

  // 3. Legacy `category` (single string) → `tags` (array). Map old enum names
  //    to current tag names via LEGACY_CATEGORY_TO_TAG. Unknown values get
  //    carried through verbatim so we don't silently drop classification.
  if (m && m.tags === undefined) {
    if (m.category && typeof m.category === 'string') {
      const mapped = LEGACY_CATEGORY_TO_TAG[m.category] || m.category;
      const { category, ...rest } = m;
      m = { ...rest, tags: [mapped] };
    } else {
      const { category, ...rest } = m;
      m = { ...rest, tags: [] };
    }
  } else if (m && !Array.isArray(m.tags)) {
    // Defensive: if tags somehow got persisted as a non-array, coerce.
    m = { ...m, tags: m.tags ? [String(m.tags)] : [] };
  }

  // 4. Tag-name remap: legacy 13-tag descriptor names → 6-tag benefit names.
  //    De-duplicate after mapping (two old tags can collapse onto the same
  //    new tag). Idempotent — when all values already match the new list,
  //    nothing changes.
  if (m && Array.isArray(m.tags) && m.tags.length > 0) {
    const remapped = m.tags.map(t => LEGACY_TAG_TO_TAG[t] || t);
    const deduped = Array.from(new Set(remapped));
    // Skip the assignment if nothing changed — avoids gratuitous object churn.
    const same = deduped.length === m.tags.length
      && deduped.every((v, i) => v === m.tags[i]);
    if (!same) m = { ...m, tags: deduped };
  }

  return m;
}
